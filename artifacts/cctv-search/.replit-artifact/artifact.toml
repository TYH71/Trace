kind = "web"
previewPath = "/"
title = "CCTV Footage Search"
version = "1.0.0"
id = "artifacts/cctv-search"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23948

[services.development]
run = "pnpm --filter @workspace/cctv-search run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cctv-search", "run", "build" ]
publicDir = "artifacts/cctv-search/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23948"
BASE_PATH = "/"
